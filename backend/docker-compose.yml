# =============================================================================
# IDP Unified Compose — MinIO, PostgreSQL, Airflow, API, Nginx, Monitoring
# Startup:  docker compose --env-file .env up -d
# Shutdown: docker compose --env-file .env down
# =============================================================================

networks:
  idp-backend:
    driver: bridge

volumes:
  minio_data:
  pg_data:
  neo4j_data:
  neo4j_logs:
  prometheus_data:
  grafana_data:

services:
  # -------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # -------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: "public"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - idp-backend
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 1G
          cpus: "0.5"

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh /scripts/minio-init.sh
    volumes:
      - ./infra/scripts/minio-init.sh:/scripts/minio-init.sh:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - idp-backend

  # -------------------------------------------------------------------
  # PostgreSQL + pgvector — Gold mart tables, embeddings, Airflow DB
  # -------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-idp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-idp_warehouse}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-idp_admin}", "-d", "${POSTGRES_DB:-idp_warehouse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - idp-backend
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "0.5"

  # -------------------------------------------------------------------
  # Elasticsearch 8.17 — Lexical Search
  # -------------------------------------------------------------------
  elasticsearch:
    image: elasticsearch:8.17.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ES_PASSWORD:-changeme}
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - idp-backend
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "1.0"
        reservations:
          memory: 2G
          cpus: "0.5"

  # -------------------------------------------------------------------
  # Neo4j 5 — Data Lineage Graph
  # -------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - idp-backend
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "1.0"
        reservations:
          memory: 2G
          cpus: "0.5"

  # -------------------------------------------------------------------
  # Redis — Cache & Celery Broker
  # -------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - idp-backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  # -------------------------------------------------------------------
  # Airflow — Orchestration
  # -------------------------------------------------------------------
  airflow:
    build:
      context: ./infra/docker/airflow
    image: idp-airflow:latest
    entrypoint: ["/entrypoint.sh"]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__PARALLELISM: 8
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin123}
      PYTHONPATH: /opt/airflow
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_CONNECTOR_ENDPOINT: http://minio:9000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ES_HOST: http://elasticsearch:9200
      NEO4J_URI: bolt://neo4j:7687
      DUCKDB_S3_ENDPOINT: ${DUCKDB_S3_ENDPOINT}
      DUCKDB_S3_ACCESS_KEY: ${DUCKDB_S3_ACCESS_KEY}
      DUCKDB_S3_SECRET_KEY: ${DUCKDB_S3_SECRET_KEY}
      DUCKDB_S3_USE_SSL: ${DUCKDB_S3_USE_SSL}
      DUCKDB_S3_URL_STYLE: ${DUCKDB_S3_URL_STYLE}
      AIRFLOW__METRICS__STATSD_ON: "True"
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: 9125
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags:ro
      - ./idp:/opt/airflow/idp:ro
      - ./services:/opt/airflow/services:ro
      - ./transform:/opt/airflow/transform:rw
    restart: unless-stopped
    networks:
      - idp-backend
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G

  # -------------------------------------------------------------------
  # FastAPI Service
  # -------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: idp-api:latest
    command: ["uvicorn", "services.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8001:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://api_service:${API_SERVICE_PASSWORD}@postgres:5432/idp_warehouse
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ES_HOST=http://elasticsearch:9200
      - NEO4J_URI=bolt://neo4j:7687
      - NO_PROXY=localhost,127.0.0.1,minio,postgres,elasticsearch,neo4j,redis,api,idp-api-1,idp-elasticsearch-1,idp-neo4j-1,idp-postgres-1,10.88.0.0/16
      - no_proxy=localhost,127.0.0.1,minio,postgres,elasticsearch,neo4j,redis,api,idp-api-1,idp-elasticsearch-1,idp-neo4j-1,idp-postgres-1,10.88.0.0/16
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - idp-backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M

  # -------------------------------------------------------------------
  # Nginx Reverse Proxy
  # -------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - airflow
    networks:
      - idp-backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # -------------------------------------------------------------------
  # Monitoring
  # -------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    environment:
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=localhost,127.0.0.1,api,minio,postgres,elasticsearch,neo4j
      - no_proxy=localhost,127.0.0.1,api,minio,postgres,elasticsearch,neo4j
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - idp-backend

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=localhost,127.0.0.1,prometheus,api
      - no_proxy=localhost,127.0.0.1,prometheus,api
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json:ro
    depends_on:
      - prometheus
    networks:
      - idp-backend

  # -------------------------------------------------------------------
  # Exporters & Monitoring Tools
  # -------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    restart: unless-stopped
    networks:
      - idp-backend

  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    networks:
      - idp-backend

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      - postgres
    networks:
      - idp-backend

  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:latest
    command:
      - '--es.uri=http://elasticsearch:9200'
      - '--es.ssl-skip-verify'
      - '--es.timeout=30s'
    environment:
      - ES_USERNAME=elastic
      - ES_PASSWORD=${ES_PASSWORD:-changeme}
    depends_on:
      - elasticsearch
    networks:
      - idp-backend

  statsd-exporter:
    image: prom/statsd-exporter:latest
    ports:
      - "9125:9125/udp"
      - "9102:9102"
    networks:
      - idp-backend

