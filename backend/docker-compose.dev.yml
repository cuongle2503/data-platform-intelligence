# Development override — enables --reload and bind mounts
services:
  api:
    command: ["uvicorn", "services.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - .:/app
    environment:
      - ENVIRONMENT=development

  # Override to use localhost for host-based development if needed
  # postgres:
  #   ports:
  #     - "5433:5432"
